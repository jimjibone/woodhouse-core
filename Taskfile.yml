  build-zigbee:
    cmds:
      - task: build-component
        vars: { GOOS: "{{.GOOS}}", GOARCH: "{{.GOARCH}}", COMPONENT: "woodhouse-zigbee" }

  deploy-zigbee:
    cmds:
      - task: build-and-deploy-component
        vars: { GOOS: "{{.DEPLOY_GOOS}}", GOARCH: "{{.DEPLOY_GOARCH}}", COMPONENT: "woodhouse-zigbee" }

  build-component:
    env:
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    vars:
      BUILD_DIR: "build-{{.GOOS}}-{{.GOARCH}}"
    requires:
      vars: [COMPONENT]
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.COMPONENT}}{{exeExt}} ./cmd/{{.COMPONENT}}

  build-and-deploy-component:
    env:
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    vars:
      BUILD_DIR: "build-{{.GOOS}}-{{.GOARCH}}"
    requires:
      vars: [COMPONENT]
    cmds:
      - test "$DEPLOY_HOST"
      - test "$DEPLOY_USER"
      - test "$DEPLOY_DIR"
      - test "$DEPLOY_GOOS"
      - test "$DEPLOY_GOARCH"
      - go build -o {{.BUILD_DIR}}/{{.COMPONENT}}{{exeExt}} ./cmd/{{.COMPONENT}}
      - rsync {{.BUILD_DIR}}/{{.COMPONENT}}{{exeExt}} $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/{{.BUILD_DIR}}/
      - ssh $DEPLOY_USER@$DEPLOY_HOST systemctl --user restart {{.COMPONENT}}.service
