version: '3'

vars:
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  BUILD_DIR: "build-{{.GOOS}}-{{.GOARCH}}"

includes:
  api:
    taskfile: ./api/Taskfile.yml
    dir: ./api
  webapp:
    taskfile: ./webapp/Taskfile.yml
    dir: ./webapp

tasks:
  default:
    deps:
      - build

  proto:
    deps:
      - api:proto-go
      - api:proto-go-v1

  proto-all:
    deps:
      - proto
      - webapp:proto

  build-dir:
    cmds:
      - mkdir -p "{{.BUILD_DIR}}"

  build:
    deps:
      - build-core
      - build-bridge-shelly
      - build-bridge-zigbee

  build-all:
    cmds:
      - task: webapp:build
      - task: build

  run:
    deps:
      - run-core

  build-core:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-core{{exeExt}} ./cmd/woodhouse-core

  run-core:
    deps:
      - build-core
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-core{{exeExt}} {{.CLI_ARGS}}

  build-whctl:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/whctl{{exeExt}} ./cmd/whctl

  run-whctl:
    deps:
      - build-whctl
    cmds:
      - cd {{.BUILD_DIR}} && ./whctl{{exeExt}} {{.CLI_ARGS}}

  build-client:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-client{{exeExt}} ./cmd/woodhouse-client

  run-client:
    deps:
      - build-client
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-client{{exeExt}} {{.CLI_ARGS}}

  build-shelly:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-shelly{{exeExt}} ./cmd/woodhouse-shelly

  run-shelly:
    deps:
      - build-shelly
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-shelly{{exeExt}} {{.CLI_ARGS}}

  build-zigbee:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-zigbee{{exeExt}} ./cmd/woodhouse-zigbee

  run-zigbee:
    deps:
      - build-zigbee
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-zigbee{{exeExt}} {{.CLI_ARGS}}
