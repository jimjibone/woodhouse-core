version: '3'

vars:
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  BUILD_DIR: "build-{{.GOOS}}-{{.GOARCH}}"

includes:
  api:
    taskfile: ./api/Taskfile.yml
    dir: ./api
  webapp:
    taskfile: ./webapp/Taskfile.yml
    dir: ./webapp

tasks:
  default:
    deps:
      - build

  proto:
    deps:
      - api:proto-go
      - webapp:proto

  proto-all:
    deps:
      - proto
      - webapp:proto

  build-dir:
    cmds:
      - mkdir -p "{{.BUILD_DIR}}"

  build:
    deps:
      - build-core
      - build-bridge-shelly
      - build-bridge-zigbee

  build-all:
    cmds:
      - task: webapp:build
      - task: build

  run:
    deps:
      - run-core

  build-core:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-core{{exeExt}} ./cmd/woodhouse-core

  run-core:
    deps:
      - build-core
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-core{{exeExt}} {{.CLI_ARGS}}

  build-bridge-shelly:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-bridge-shelly{{exeExt}} ./cmd/woodhouse-bridge-shelly

  run-bridge-shelly:
    deps:
      - build-bridge-shelly
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-bridge-shelly{{exeExt}} {{.CLI_ARGS}}

  build-bridge-zigbee:
    deps:
      - proto
      - build-dir
    cmds:
      - go build -o {{.BUILD_DIR}}/woodhouse-bridge-zigbee{{exeExt}} ./cmd/woodhouse-bridge-zigbee

  run-bridge-zigbee:
    deps:
      - build-bridge-zigbee
    cmds:
      - cd {{.BUILD_DIR}} && ./woodhouse-bridge-zigbee{{exeExt}} {{.CLI_ARGS}}
