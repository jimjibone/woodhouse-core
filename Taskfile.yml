version: '3'

vars:
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH
  BUILD_DIR: "build-{{.GOOS}}-{{.GOARCH}}"

dotenv:
  - '.env'

includes:
  api:
    taskfile: ./api
    dir: ./api

tasks:
  build-api:
    desc: Generate API code from protos
    cmds:
      - task api:proto-go-v1

  generate-env:
    desc: Generate the default .env file
    status:
      - test -f .env
    cmds:
      - cp dot-env .env

  build-core:
    desc: Build woodhouse-core
    cmds:
      - task: build-api
      # - task: webapp:build
      - task: build-component
        vars: { GOOS: "{{.GOOS}}", GOARCH: "{{.GOARCH}}", COMPONENT: "woodhouse-core" }

  deploy-core:
    desc: Deploy woodhouse-core to your confiugred system (use 'generate-env' to configure)
    cmds:
      - task: build-api
      # - task: webapp:build
      - task: build-and-deploy-component
        vars: { GOOS: "{{.DEPLOY_GOOS}}", GOARCH: "{{.DEPLOY_GOARCH}}", COMPONENT: "woodhouse-core" }

