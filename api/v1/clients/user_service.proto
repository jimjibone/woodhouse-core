syntax = "proto3";

package woodhouse.api.v1.clients;
option go_package = "github.com/jimjibone/woodhouse-4/api/go/v1/clients;clientsapi";

import "clients/client.proto";
import "clients/client_service.proto";

service UserService {
    // Get the current Client states. This returns a stream of Clients which
    // will close once all Clients are sent. Use ClientsStream method to get a
    // stream of current Client states and updates.
    rpc GetClients(GetClientsRequest) returns (stream Client);

    // Get a stream of Client updates. The first batch of replies will be the
    // current state of the clients, followed by updates when they occur. The
    // stream also includes a 10 second heartbeat (an empty Client) which should
    // be ignored, but can be used to monitor the stream for disconnects.
    rpc ClientsStream(ClientsStreamRequest) returns (stream Client);

    // Get a stream of pending pairing requests and updates. The first batch of
    // replies will be the current set, followed by updates when they occur. The
    // stream also includes a 10 second heartbeat (an empty response) which should
    // be ignored, but can be used to monitor the stream for disconnects.
    rpc PairingRequestsStream(PairingRequestsStreamRequest) returns (stream PairingRequestsStreamResponse);

    // Approve a pairing request.
    rpc ApprovePairing(ApprovePairingRequest) returns (ApprovePairingResponse);

    // Deny a pairing request.
    rpc DenyPairing(DenyPairingRequest) returns (DenyPairingResponse);

    // Unpair a client and invalidate auth tokens.
    rpc UnpairClient(UnpairClientRequest) returns (UnpairClientResponse);

    // Block a client (unpairs the client and blocks future pairing requests).
    rpc BlockClient(BlockClientRequest) returns (BlockClientResponse);

    // Unblock a client (allows pairing for previously blocked clients).
    rpc UnblockClient(UnblockClientRequest) returns (UnblockClientResponse);

    // Forget a client.
    rpc ForgetClient(ForgetClientRequest) returns (ForgetClientResponse);

    // Get the current device states. This returns a stream of devices which
    // will close once all devices are sent. Use DevicesStream method to get a
    // stream of current device states and updates.
    rpc GetDevices(GetDevicesRequest) returns (stream Device);

    // Get a stream of Device updates. The first batch of replies will be the
    // current state of the devices, followed by updates when they occur. The
    // stream also includes a 10 second heartbeat (an empty Device) which should
    // be ignored, but can be used to monitor the stream for disconnects.
    rpc DevicesStream(DevicesStreamRequest) returns (stream Device);

    // Get a stream of DeviceService updates for favorites. The first batch of
    // replies will be the current state of the favorites, followed by updates
    // when they occur. The stream also includes a 10 second heartbeat (an empty
    // response) which should be ignored, but can be used to monitor the stream
    // for disconnects.
    rpc FavoritesStream(FavoritesStreamRequest) returns (stream FavoritesStreamResponse);

    rpc AddFavorite(AddFavoriteRequest) returns (AddFavoriteResponse);
    rpc RemoveFavorite(RemoveFavoriteRequest) returns (RemoveFavoriteResponse);

    // Send an action to a device service.
    rpc SendAction(ActionRequest) returns (stream ActionResponse);

    // Send an image request to a device service.
    rpc SendImageRequest(ImageRequest) returns (stream ImageResponse);

    // Get a stream of User updates. The first batch of replies will be the
    // current state of the users, followed by updates when they occur. The
    // stream also includes a 10 second heartbeat (an empty User) which should
    // be ignored, but can be used to monitor the stream for disconnects.
    rpc UsersStream(UsersStreamRequest) returns (stream UsersStreamResponse);

    rpc AddUser(AddUserRequest) returns (AddUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc RemoveUser(RemoveUserRequest) returns (RemoveUserResponse);
}

message GetClientsRequest {}
message ClientsStreamRequest {}

message PairingRequestsStreamRequest {}
message PairingRequestsStreamResponse {
    PairingRequest pairing_request = 1; // Optional: A pairing request update, possibly containing the full state.
    string pairing_removed = 2; // Optional: Indicates the client_id of a pairing request that was removed.
}

message ApprovePairingRequest {
    string client_id = 1;
    string pairing_code = 2;
}
message ApprovePairingResponse {}

message DenyPairingRequest {
    string client_id = 1;
}
message DenyPairingResponse {}

message UnpairClientRequest {
    string client_id = 1;
}
message UnpairClientResponse {}

message BlockClientRequest {
    string client_id = 1;
}
message BlockClientResponse {}

message UnblockClientRequest {
    string client_id = 1;
}
message UnblockClientResponse {}

message ForgetClientRequest {
    string client_id = 1;
}
message ForgetClientResponse {}

message GetDevicesRequest {}

message DevicesStreamRequest {
    // A list of device IDs to include in the steam. Sends all devices if empty.
    repeated string include_device_ids = 1;
}

message DeviceService {
    string key = 1; // The key is a combined version of the device and service IDs.

    string device_id  = 2; // The universally unique device ID (typically a hardware address or other static and unique identifier, e.g. "00158d00045c089f").
    bool   full_state = 3; // Indicates that this message contains the entire state of the device.

    // The device name from the info service. May not be set if the value has not changed and full_state is false.
    optional string device_name = 5;

    // The device online state from the online service. May not be set if the value has not changed and full_state is
    // false.
    optional bool online = 7;

    // The device last seen time from the online service. May not be set if the last_seen value has not changed and
    // full_state is false.
    optional TimeValue last_seen = 9;

    // The device battery level state from the battery service. May not be set if the battery_level value has not
    // changed and full_state is false, or if the device does not have the battery service.
    optional int64 battery_level = 11;

    Service service = 12; // A service belonging to the device.
}

message FavoritesStreamRequest {}
message FavoritesStreamResponse {
    DeviceService device_service = 1; // Optional: A DeviceService update, possibly containing the full state.
    string        key_removed    = 2; // Optional: Indicates the key of a DeviceService that was was removed.
}

message AddFavoriteRequest {
    string device_id  = 1;
    string service_id = 2;
}
message AddFavoriteResponse {}

message RemoveFavoriteRequest {
    string device_id  = 1;
    string service_id = 2;
}
message RemoveFavoriteResponse {}

message UsersStreamRequest {}
message UsersStreamResponse {
    User   user         = 1; // Optional: A User update, possibly containing the full state.
    string user_removed = 2; // Optional: Indicates the key of a User that was removed.
}

message AddUserRequest {
    string   username         = 1;
    string   fullname        = 2;
    UserRole role             = 3;
    string   initial_password = 4;
}
message AddUserResponse {}

message UpdateUserRequest {
    string            username  = 1;
    optional string   fullname = 2;
    optional UserRole role      = 3;
    optional string   password  = 4;
}
message UpdateUserResponse {}

message RemoveUserRequest {
    string username = 1;
}
message RemoveUserResponse {}

message User {
    string   username  = 1;
    string   fullname = 2;
    UserRole role      = 3;
}

enum UserRole {
    USER_ROLE_UNDEFINED = 0;
    USER_ROLE_ADMIN     = 1;
    USER_ROLE_USER      = 2;
}
