syntax = "proto3";

package woodhouse.api.v1.clients;
option go_package = "github.com/jimjibone/woodhouse-4/api/go/v1/clients;clientsapi";

import "clients/client_service.proto";

service UserService {
    rpc GetDevices(GetDevicesRequest) returns (stream Device);

    // Get a stream of Device updates. The first batch of replies will be the
    // current state of the devices, followed by updates when they occur. The
    // stream also includes a 10 second heartbeat (an empty Device) which should
    // be ignored, but can be used to monitor the stream for disconnects.
    rpc DevicesStream (DevicesStreamRequest) returns (stream Device);

    // Get a stream of DeviceService updates for favorites. The first batch of
    // replies will be the current state of the favorites, followed by updates
    // when they occur. The stream also includes a 10 second heartbeat (an empty
    // response) which should be ignored, but can be used to monitor the stream
    // for disconnects.
    rpc FavoritesStream (FavoritesStreamRequest) returns (stream FavoritesStreamResponse);

    rpc AddFavorite (AddFavoriteRequest) returns (AddFavoriteResponse);
    rpc RemoveFavorite (RemoveFavoriteRequest) returns (RemoveFavoriteResponse);

    // Send an action to a device service.
    rpc SendAction(ActionRequest) returns (stream ActionResponse);

    // Send an image request to a device service.
    rpc SendImageRequest(ImageRequest) returns (stream ImageResponse);
}

message GetDevicesRequest {}

message DevicesStreamRequest {
    // A list of device IDs to include in the steam. Sends all devices if empty.
    repeated string include_device_ids = 1;
}

message DeviceService {
    string key = 1; // The key is a combined version of the device and service IDs.

    string device_id  = 2; // The universally unique device ID (typically a hardware address or other static and unique identifier, e.g. "00158d00045c089f").
    bool   full_state = 3; // Indicates that this message contains the entire state of the device.

    // The device name from the info service. May not be set if the value has not changed and full_state is false.
    optional string device_name = 5;

    // The device online state from the online service. May not be set if the value has not changed and full_state is
    // false.
    optional bool online     = 7;

    // The device last seen time from the online service. May not be set if the last_seen value has not changed and
    // full_state is false.
    optional TimeValue last_seen = 9;

    // The device battery level state from the battery service. May not be set if the battery_level value has not
    // changed and full_state is false, or if the device does not have the battery service.
    optional int64 battery_level = 11;

    Service service = 12; // A service belonging to the device.
}

message FavoritesStreamRequest {}
message FavoritesStreamResponse {
    DeviceService device_service = 1; // Optional: A DeviceService update, possibly containing the full state.
    string        key_removed    = 2; // Optional: Indicates the key of a DeviceService that was was removed.
}

message AddFavoriteRequest {
    string device_id = 1;
    string service_id = 2;
}
message AddFavoriteResponse {}

message RemoveFavoriteRequest {
    string device_id = 1;
    string service_id = 2;
}
message RemoveFavoriteResponse {}
