version: '3'

tasks:
  proto-go-plugins:
    run: when_changed
    status:
      - test -f .bin/protoc-gen-go
      - test -f .bin/protoc-gen-go-grpc
    cmds:
      - mkdir -p .bin
      - go build -o .bin/protoc-gen-go google.golang.org/protobuf/cmd/protoc-gen-go
      - go build -o .bin/protoc-gen-go-grpc google.golang.org/grpc/cmd/protoc-gen-go-grpc

  proto-go-v1:
    run: when_changed
    deps:
      - proto-go-plugins
    sources:
      - ./v1/*/*.proto
    generates:
      - ./go/v1/*/*.pb.go
    cmds:
      - mkdir -p ./go/v1
      - protoc --plugin=.bin/protoc-gen-go -I./v1 --go_out=./go/v1 --go_opt=module=github.com/jimjibone/woodhouse-4/api/go/v1 ./v1/*/*.proto
      - protoc --plugin=.bin/protoc-gen-go-grpc -I./v1 --go-grpc_out=./go/v1 --go-grpc_opt=module=github.com/jimjibone/woodhouse-4/api/go/v1 ./v1/*/*_service.proto
