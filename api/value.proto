syntax = "proto3";

package woodhouse.api;
option go_package = "github.com/jimjibone/woodhouse-4/api/go;api";

message BoolValue {
    bool value = 1;
}

message NumberValue {
    // Brightness: 0-100 percent
    double value = 1;
}

message TextValue {
    string value = 1;
}

message ColorValue {
    float hue = 1; // Hue value: 0-360 degrees
    float sat = 2; // Saturation value: 0-100 percent
}
